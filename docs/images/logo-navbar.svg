<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="geometrics logo">
  <title>geometrics</title>
  <!-- The classified lattice in white, opacity-stepped so the choropleth ramp
       survives on the solid blue navbar. -->
  <rect x="4"  y="4"  width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.30"/>
  <rect x="24" y="4"  width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.45"/>
  <rect x="44" y="4"  width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.62"/>
  <rect x="4"  y="24" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.45"/>
  <rect x="24" y="24" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.62"/>
  <rect x="44" y="24" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.82"/>
  <rect x="4"  y="44" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.62"/>
  <rect x="24" y="44" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="0.82"/>
  <rect x="44" y="44" width="16" height="16" rx="3" fill="#ffffff" fill-opacity="1.0"/>
</svg>
