project:
  type: website
  output-dir: _site
  resources:
    - robots.txt

website:
  title: "geometrics"
  description: "Regional growth, convergence, and inequality analysis on the PySAL stack."
  favicon: images/favicon.png
  repo-url: https://github.com/quarcs-lab/geometrics
  repo-actions: [issue, edit]
  navbar:
    background: primary
    logo: images/logo-navbar.svg
    logo-alt: "geometrics logo"
    left:
      - text: "Home"
        file: index.qmd
      - text: "Quickstart"
        file: quickstart.qmd
      - text: "For AI / LLMs"
        file: use-with-llms.qmd
      - text: "Articles"
        menu:
          - text: "The data model (gdf, df, df_dict)"
            file: articles/data-model.qmd
          - text: "Beta and sigma convergence"
            file: articles/convergence.qmd
          - text: "Spatial dependence and LISA"
            file: articles/spatial-dependence.qmd
          - text: "Spatial spillovers (SDM)"
            file: articles/spillovers.qmd
          - text: "Regional inequality"
            file: articles/inequality.qmd
          - text: "Distribution dynamics"
            file: articles/dynamics.qmd
          - text: "The India case study"
            file: articles/india-case-study.qmd
          - text: "The Bolivia dataset"
            file: articles/bolivia-dataset.qmd
      - text: "Reference"
        file: reference/index.qmd
      - text: "Changelog"
        file: changelog.qmd
    right:
      - icon: github
        href: https://github.com/quarcs-lab/geometrics
  sidebar:
    style: docked
    contents:
      - reference/_sidebar.yml

# The docs execute against the project venv via a registered kernelspec (a user-level
# `python3` kernel can otherwise shadow it). Register with:
#   uv run python -m ipykernel install --user --name geometrics
jupyter: geometrics

execute:
  freeze: auto

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      text: |
        <link rel="alternate" type="text/markdown" href="/geometrics/llms.txt" title="llms.txt for LLMs">
        <link rel="alternate" type="text/plain" href="/geometrics/llms-full.txt" title="llms-full.txt for LLMs">

metadata-files:
  - reference/_sidebar.yml

quartodoc:
  package: geometrics
  parser: numpy
  title: API Reference
  sidebar: reference/_sidebar.yml
  dir: reference
  render_interlinks: true
  sections:
    - title: Maps & exploratory spatial analysis
      desc: >-
        Interactive Plotly maps and ESDA — classified and animated choropleths, the
        weights connectivity graph, Moran scatterplots, LISA cluster maps, Moran's I
        over time, and space-time descriptives of the regional distribution.
      contents:
        - explore_choropleth_map
        - explore_connectivity_map
        - explore_moran_plot
        - explore_lisa_cluster_map
        - explore_moran_over_time
        - explore_distribution_over_time
        - explore_spacetime_heatmap
    - title: Convergence
      desc: >-
        β-convergence with OLS or spatial estimators (SAR / SEM / SLX / SDM) and the
        LeSage-Pace impact decomposition, σ-convergence (dispersion trends), and
        Phillips-Sul convergence clubs with club maps.
      contents:
        - analyze_beta_convergence
        - analyze_sigma_convergence
        - analyze_convergence_clubs
        - growth_cross_section
    - title: Spatial econometric models
      desc: >-
        The spreg suite — OLS / spatial lag / spatial error / SLX / spatial Durbin
        estimation with direct, indirect and total impacts; Lagrange-multiplier
        specification diagnostics with a model recommendation; and robustness of the
        impacts to the choice of spatial weights.
      contents:
        - analyze_spatial_model
        - analyze_spatial_diagnostics
        - analyze_spatial_model_by_weights
    - title: Distribution dynamics
      desc: >-
        Markov transition analysis of the regional distribution and Rey's spatially
        conditioned Markov chains (requires the `dynamics` extra).
      contents:
        - analyze_markov_transitions
        - analyze_spatial_markov
    - title: Regional inequality
      desc: >-
        Gini / Theil / CV trends over time (with the spatial Gini decomposition), and
        the Theil between/within decomposition across regional groupings.
      contents:
        - analyze_inequality_over_time
        - analyze_theil_decomposition
    - title: Local models
      desc: >-
        Geographically weighted regression and multiscale GWR with mapped local
        coefficients and multiple-testing-corrected significance masking.
      contents:
        - analyze_gwr
        - analyze_mgwr
    - title: Learn (concept sandboxes)
      desc: >-
        Monte-Carlo teaching sandboxes that simulate data from a known
        data-generating process so a learner can watch each estimator recover a
        planted parameter. No data required — each takes keyword knobs and returns
        `.df` / `.fig` / `.summary` / `.interpret()`. The two Markov sandboxes need
        the `dynamics` extra.
      contents:
        - learn_spatial_autocorrelation
        - learn_spatial_weights
        - learn_lisa_clusters
        - learn_spatial_spillovers
        - learn_omitted_spatial_lag
        - learn_beta_convergence
        - learn_sigma_convergence
        - learn_convergence_clubs
        - learn_markov_chains
        - learn_spatial_markov
        - learn_theil_decomposition
    - title: Utilities
      desc: >-
        Cross-cutting helpers — geometry loading, spatial-weights construction, panel
        declaration, data-dictionary inference, theming, and the concept-explainer
        registry.
      contents:
        - read_gdf
        - make_weights
        - set_panel
        - resolve_panel
        - set_labels
        - resolve_label
        - set_roles
        - build_data_dict
        - set_palette
        - get_palette
        - explain
        - list_topics
    - title: Datasets
      desc: >-
        The bundled case studies — 520 Indian districts observed by satellite
        nighttime lights (1996-2010) with a 32-state demo, and the Bolivia
        PWT-anchored local GDP collection (departments, provinces, and 0.25-degree
        grid cells, 2012-2022). Files are fetched from pinned GitHub raw URLs,
        hash-verified, and cached locally.
      package: geometrics.data
      contents:
        - load_india
        - load_india_states
        - load_india_raw
        - load_bolivia
        - load_bolivia_departments
        - load_bolivia_grid
        - load_bolivia_raw
        - clear_cache
