name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync environment
        run: uv sync --locked --all-extras --group dev
      - name: Ruff (lint)
        run: uv run --no-sync ruff check src tests
      - name: Ruff (format)
        run: uv run --no-sync ruff format --check src tests
      - name: mypy
        run: uv run --no-sync mypy src

  test:
    name: Tests (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync environment
        run: uv sync --locked --all-extras --group dev --python ${{ matrix.python }}
      - name: Run tests
        run: uv run --no-sync pytest -n auto --cov=geometrics --cov-report=term-missing -m "not network"

  network-tests:
    name: Network tests (real case-study data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Cache case-study data
        uses: actions/cache@v4
        with:
          path: ~/.cache/geometrics
          key: pooch-${{ hashFiles('src/geometrics/data/_registry.py') }}
      - name: Sync environment
        run: uv sync --locked --all-extras --group dev
      - name: Run network tests
        run: uv run --no-sync pytest -m network
